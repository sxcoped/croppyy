version: "3.9"

services:
  # ── Backend API ────────────────────────────────────────────────────────────
  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    container_name: croppy-api
    ports:
      - "8000:8000"
    volumes:
      - ./ml_models:/app/ml_models        # persist trained models
      - ./backend:/app/backend
    env_file:
      - .env
    depends_on:
      - redis
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # ── React Dashboard ────────────────────────────────────────────────────────
  dashboard:
    build:
      context: ./dashboard
      dockerfile: Dockerfile.dashboard
    container_name: croppy-dashboard
    ports:
      - "3000:80"
    depends_on:
      - backend
    restart: unless-stopped

  # ── Redis (cache + Celery queue) ──────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: croppy-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    restart: unless-stopped
    command: redis-server --appendonly yes

volumes:
  redis_data:
